name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: leavesync
          POSTGRES_PASSWORD: leavesync
          POSTGRES_DB: leavesync_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://leavesync:leavesync@localhost:5432/leavesync_test

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: cd packages/database && bunx prisma generate

      - name: Run migrate deploy
        run: bun run migrate:deploy

      - name: Drift check (schema must match deployed migrations)
        run: |
          cd packages/database
          output=$(DATABASE_URL=$DATABASE_URL bunx prisma migrate diff \
            --from-config-datasource \
            --to-schema prisma/schema.prisma \
            --script 2>&1)
          echo "$output"
          if ! echo "$output" | grep -q "This is an empty migration"; then
            echo "ERROR: schema drift detected between migrations and schema.prisma"
            exit 1
          fi

      - name: Run unit tests
        run: bun run test

      - name: Run integration tests
        run: bun run test:integration
